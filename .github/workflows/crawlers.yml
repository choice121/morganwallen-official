name: 🎸 Morgan Wallen — Content Crawlers

on:
  # ── Automatic schedules ────────────────────────────────────────────────────
  schedule:
    - cron: "0 */2 * * *"    # news: every 2 hours
    - cron: "0 */6 * * *"    # tour: every 6 hours  (also caught by 2h run)
    - cron: "0 8 * * *"      # videos + merch + gallery: daily at 8 AM UTC
    - cron: "0 9 * * 1"      # albums: weekly Monday 9 AM UTC

  # ── Manual trigger with crawler selection ──────────────────────────────────
  workflow_dispatch:
    inputs:
      crawler:
        description: "Which crawler(s) to run"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - albums
          - tour
          - news
          - merch
          - videos
          - gallery

# Cancel in-progress runs so schedules don't pile up
concurrency:
  group: crawlers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── News (every 2 hours) ───────────────────────────────────────────────────
  news:
    name: 📰 News
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' && 
      (github.event.inputs.crawler == 'all' || github.event.inputs.crawler == 'news') ||
      github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: crawlers/requirements.txt

      - name: Install dependencies
        working-directory: crawlers
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          python -m crawl4ai.install_dependencies 2>/dev/null || crawl4ai-setup 2>/dev/null || true
          python -m playwright install chromium --with-deps

      - name: Run news crawler
        working-directory: crawlers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          IMAGEKIT_PRIVATE_KEY: ${{ secrets.IMAGEKIT_PRIVATE_KEY }}
          IMAGEKIT_PUBLIC_KEY: ${{ secrets.IMAGEKIT_PUBLIC_KEY }}
        run: python run_all.py --crawler news

  # ── Tour (every 6 hours) ──────────────────────────────────────────────────
  tour:
    name: 🎟️ Tour Dates
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.crawler == 'all' || github.event.inputs.crawler == 'tour') ||
      github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: crawlers/requirements.txt
      - name: Install dependencies
        working-directory: crawlers
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tour crawler
        working-directory: crawlers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python run_all.py --crawler tour

  # ── Albums (weekly) ───────────────────────────────────────────────────────
  albums:
    name: 🎵 Albums & Tracks
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.crawler == 'all' || github.event.inputs.crawler == 'albums') ||
      github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: crawlers/requirements.txt
      - name: Install dependencies
        working-directory: crawlers
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run albums crawler
        working-directory: crawlers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: python run_all.py --crawler albums

  # ── Videos (daily) ───────────────────────────────────────────────────────
  videos:
    name: 🎬 Videos
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.crawler == 'all' || github.event.inputs.crawler == 'videos') ||
      github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: crawlers/requirements.txt
      - name: Install dependencies
        working-directory: crawlers
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run videos crawler
        working-directory: crawlers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python run_all.py --crawler videos

  # ── Merch (daily) ────────────────────────────────────────────────────────
  merch:
    name: 🛍️ Merch
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.crawler == 'all' || github.event.inputs.crawler == 'merch') ||
      github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: crawlers/requirements.txt
      - name: Install dependencies
        working-directory: crawlers
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps
      - name: Run merch crawler
        working-directory: crawlers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          IMAGEKIT_PRIVATE_KEY: ${{ secrets.IMAGEKIT_PRIVATE_KEY }}
          IMAGEKIT_PUBLIC_KEY: ${{ secrets.IMAGEKIT_PUBLIC_KEY }}
        run: python run_all.py --crawler merch

  # ── Gallery (daily) ───────────────────────────────────────────────────────
  gallery:
    name: 🖼️ Gallery
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.crawler == 'all' || github.event.inputs.crawler == 'gallery') ||
      github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: crawlers/requirements.txt
      - name: Install dependencies
        working-directory: crawlers
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run gallery crawler
        working-directory: crawlers
